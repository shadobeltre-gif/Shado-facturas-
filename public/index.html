<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SHADO — Cheques & Facturas</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f1117; font-family: 'Segoe UI', Arial, sans-serif; }
  @keyframes spin { to { transform: rotate(360deg); } }
  input:focus { outline: 2px solid #4f7cff; outline-offset: 1px; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #1a1d27; }
  ::-webkit-scrollbar-thumb { background: #2e3352; border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef } = React;

const STEPS = ["Plantilla", "Documentos", "Revisión", "Exportar"];
const C = {
  bg:"#0f1117", surface:"#1a1d27", card:"#21253a", border:"#2e3352",
  accent:"#4f7cff", success:"#22c55e", warning:"#f59e0b", danger:"#ef4444",
  text:"#e8eaf6", muted:"#8b92b8", highlight:"#2a3060",
};

// ── Helpers ───────────────────────────────────────────────────────────────────

function fileToBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(",")[1]);
    r.onerror = () => rej(new Error("Error leyendo archivo"));
    r.readAsDataURL(file);
  });
}

function getMediaType(file) {
  if (file.type === "application/pdf") return "application/pdf";
  if (file.type.startsWith("image/")) return file.type;
  return "image/jpeg";
}

// Calls our own Vercel serverless function — API key never exposed to browser
async function callClaude(messages, systemPrompt) {
  const res = await fetch("/api/claude", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 2000,
      system: systemPrompt,
      messages,
    }),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err?.error?.message || `Error ${res.status}`);
  }
  const data = await res.json();
  return data.content.map(b => b.text || "").join("");
}

function parseJSON(raw) {
  try { return JSON.parse(raw.replace(/```json|```/g, "").trim()); }
  catch { return null; }
}

function fmt(n) { return (n || 0).toLocaleString("es-DO", { minimumFractionDigits: 2 }); }
function parseMonto(s) { return parseFloat((s || "0").replace(/[^0-9.]/g, "")) || 0; }

// ── Sub-components ────────────────────────────────────────────────────────────

function UploadBox({ label, accept, file, onChange, icon, color }) {
  const ref = useRef();
  const [over, setOver] = useState(false);
  const drop = e => { e.preventDefault(); setOver(false); if (e.dataTransfer.files[0]) onChange(e.dataTransfer.files[0]); };
  return (
    <div onClick={() => ref.current.click()}
      onDragOver={e => { e.preventDefault(); setOver(true); }}
      onDragLeave={() => setOver(false)} onDrop={drop}
      style={{ border:`2px dashed ${over?color:file?C.success:C.border}`, borderRadius:12, padding:"24px 16px",
        cursor:"pointer", background:over?`${color}18`:file?"#22c55e11":C.card, transition:"all .2s",
        textAlign:"center", minHeight:110, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:8 }}>
      <input ref={ref} type="file" accept={accept} style={{display:"none"}} onChange={e => e.target.files[0] && onChange(e.target.files[0])} />
      <div style={{fontSize:28}}>{file ? "✅" : icon}</div>
      <div style={{color:file?C.success:C.text, fontWeight:600, fontSize:13, wordBreak:"break-all"}}>{file ? file.name : label}</div>
      <div style={{color:C.muted, fontSize:11}}>{file ? `${(file.size/1024).toFixed(0)} KB — clic para cambiar` : `Arrastra o clic · ${accept}`}</div>
    </div>
  );
}

function Spinner({ label }) {
  return (
    <div style={{textAlign:"center", padding:32}}>
      <div style={{width:40,height:40,border:`3px solid ${C.border}`,borderTop:`3px solid ${C.accent}`,borderRadius:"50%",animation:"spin 1s linear infinite",margin:"0 auto 16px"}}/>
      <div style={{color:C.muted, fontSize:13}}>{label}</div>
    </div>
  );
}

function StepBar({ step }) {
  return (
    <div style={{display:"flex", marginBottom:28}}>
      {STEPS.map((s, i) => (
        <div key={s} style={{flex:1, display:"flex", alignItems:"center"}}>
          <div style={{width:26,height:26,borderRadius:"50%",background:i<=step?C.accent:C.border,color:i<=step?"#fff":C.muted,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:12,flexShrink:0}}>{i+1}</div>
          <div style={{color:i<=step?C.text:C.muted, fontSize:12, marginLeft:6, fontWeight:i===step?700:400}}>{s}</div>
          {i < STEPS.length-1 && <div style={{flex:1,height:2,background:i<step?C.accent:C.border,margin:"0 8px"}}/>}
        </div>
      ))}
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────

function App() {
  const [activeModule, setActiveModule] = useState("cheques"); // "cheques" | "f606"
  const [step, setStep]               = useState(0);
  const [xlsxFile, setXlsxFile]       = useState(null);
  const [xlsxData, setXlsxData]       = useState(null);
  const [templateInfo, setTemplateInfo]= useState(null);
  const [chequeFile, setChequeFile]   = useState(null);
  const [facturaFile, setFacturaFile] = useState(null);
  const [loading, setLoading]         = useState(false);
  const [loadingMsg, setLoadingMsg]   = useState("");
  const [error, setError]             = useState(null);
  const [editData, setEditData]       = useState(null);
  const [resultBlob, setResultBlob]   = useState(null);
  const [resultName, setResultName]   = useState("");
  const [retenciones, setRetenciones] = useState({ aplicar_isr:true, aplicar_itbis:true, base_isr:"", base_itbis:"" });

  // ── Estado módulo 606 ──────────────────────────────────────────────────────
  const [f606Step, setF606Step]       = useState(0);
  const [f606Pdf, setF606Pdf]         = useState(null);
  const [f606Loading, setF606Loading] = useState(false);
  const [f606LoadingMsg, setF606LoadingMsg] = useState("");
  const [f606Error, setF606Error]     = useState(null);
  const [f606Header, setF606Header]   = useState({ rnc:"", periodo:"" });
  const [f606Rows, setF606Rows]       = useState([]);
  const [f606ResultBlob, setF606ResultBlob] = useState(null);
  const [f606ResultName, setF606ResultName] = useState("");

  const F606_TIPOS_BIEN = [
    ["01","Gastos de personal"],["02","Gastos por trabajo, suministros y servicios"],
    ["03","Arrendamientos"],["04","Gastos de activos fijos"],["05","Gastos de representación"],
    ["06","Otras deducciones admitidas"],["07","Gastos financieros"],["08","Gastos extraordinarios"],
    ["09","Compras y gastos que forman parte del costo de venta"],["10","Adquisiciones de activos"],
    ["11","Gastos de seguros"],["12","Otras compras de bienes y servicios"],
  ];
  const F606_TIPOS_ID = [["1","RNC"],["2","Cédula"],["3","Pasaporte"]];
  const F606_FORMA_PAGO = [["01","Efectivo"],["02","Cheque/Transferencia/Depósito"],["03","Tarjeta Crédito/Débito"],["04","Compra a Crédito"],["05","Permuta"],["06","Nota de Crédito"],["07","Mixto"]];

  function blankF606Row() {
    return {
      rnc_cedula:"", tipo_id:"1", tipo_bien_servicio:"02", ncf:"", ncf_modificado:"",
      fecha_comprobante:"", fecha_pago:"", monto_servicios:"", monto_bienes:"",
      monto_facturado_total:"", itbis_facturado:"", itbis_retenido:"",
      itbis_sujeto_proporcionalidad:"", itbis_llevado_costo:"", itbis_por_adelantar:"",
      itbis_percibido_compras:"", tipo_retencion_isr:"", monto_retencion_renta:"",
      isr_percibido_compras:"", impuesto_selectivo_consumo:"", otros_impuestos_tasas:"",
      monto_propina_legal:"", forma_pago:"02",
    };
  }


  function calcRet(facData, ret) {
    const subtotal    = parseMonto(facData?.subtotal);
    const totalCuentas= (facData?.cuentas||[]).reduce((s,c) => s+parseMonto(c.monto), 0);
    const base        = subtotal || totalCuentas;
    const baseIsr     = parseFloat(ret.base_isr)   || base;
    const baseItbis   = parseFloat(ret.base_itbis) || base;
    const montoIsr    = ret.aplicar_isr   ? +(baseIsr*0.05).toFixed(2)   : 0;
    const montoItbis  = ret.aplicar_itbis ? +(baseItbis*0.18).toFixed(2) : 0;
    return { base, montoIsr, montoItbis, totalRet: montoIsr+montoItbis, neto: base-montoIsr-montoItbis };
  }

  // ── 606: Extraer todas las facturas del PDF mensual ─────────────────────────
  async function f606Extract() {
    if (!f606Pdf) return;
    setF606Loading(true); setF606Error(null);
    try {
      setF606LoadingMsg("Leyendo PDF con todas las facturas…");
      const b64 = await fileToBase64(f606Pdf);
      const mt  = getMediaType(f606Pdf);
      const blocks = [
        mt==="application/pdf"
          ? {type:"document", source:{type:"base64",media_type:mt,data:b64}}
          : {type:"image",    source:{type:"base64",media_type:mt,data:b64}},
        {type:"text", text:`Este archivo contiene VARIAS facturas de compra escaneadas, una tras otra (puede ser un PDF de varias páginas, una o más facturas por página).

Identifica y separa CADA factura individual. Para cada una extrae los datos necesarios para el Formato 606 de la DGII (Compras de Bienes y Servicios).

Responde SOLO JSON válido sin markdown, con este formato exacto:
{"facturas":[
  {
    "rnc_cedula":"RNC o cédula del proveedor, solo números, sin guiones",
    "tipo_id":"1 si es RNC, 2 si es cédula, 3 si es pasaporte",
    "ncf":"número de comprobante fiscal completo (NCF o e-NCF)",
    "ncf_modificado":"solo si es nota de crédito/débito que modifica otro NCF, sino vacío",
    "fecha_comprobante":"fecha de la factura en formato AAAAMMDD",
    "fecha_pago":"fecha de pago si se ve en el documento, formato AAAAMMDD, sino vacío",
    "monto_servicios":"monto facturado por servicios (sin ITBIS), 0 si no aplica",
    "monto_bienes":"monto facturado por bienes (sin ITBIS), 0 si no aplica",
    "monto_facturado_total":"monto total facturado antes de ITBIS",
    "itbis_facturado":"monto de ITBIS que aparece en la factura, 0 si es exenta",
    "proveedor_nombre":"nombre o razón social del proveedor (solo referencia, no va al 606)",
    "concepto":"breve descripción de qué se compró"
  }
]}

Si una factura no tiene NCF visible o está borrosa, igual incluye lo que se pueda leer y deja vacío lo no legible. Cuenta cuántas facturas distintas hay — no mezcles dos facturas en una sola fila.`}
      ];
      setF606LoadingMsg("Identificando y separando facturas con IA…");
      const system = `Eres un experto contable dominicano especializado en el Formato 606 de la DGII. Tu tarea es leer un documento con múltiples facturas escaneadas y extraer los datos de CADA UNA por separado con precisión. Responde ÚNICAMENTE JSON válido.`;
      const raw  = await callClaude([{role:"user", content:blocks}], system);
      const data = parseJSON(raw);
      if (!data || !data.facturas) throw new Error("No se pudieron identificar facturas en el documento. Verifica que sea legible.");

      const rows = data.facturas.map(f => {
        const base = blankF606Row();
        const itbisFact = parseMonto(f.itbis_facturado);
        return {
          ...base,
          rnc_cedula: (f.rnc_cedula||"").replace(/[^0-9]/g,""),
          tipo_id: f.tipo_id || "1",
          ncf: f.ncf || "",
          ncf_modificado: f.ncf_modificado || "",
          fecha_comprobante: f.fecha_comprobante || "",
          fecha_pago: f.fecha_pago || "",
          monto_servicios: parseMonto(f.monto_servicios) || 0,
          monto_bienes: parseMonto(f.monto_bienes) || 0,
          monto_facturado_total: parseMonto(f.monto_facturado_total) || (parseMonto(f.monto_servicios)+parseMonto(f.monto_bienes)),
          itbis_facturado: itbisFact,
          itbis_llevado_costo: 0,
          itbis_por_adelantar: itbisFact,
          _proveedor: f.proveedor_nombre || "",
          _concepto: f.concepto || "",
        };
      });
      setF606Rows(rows);
      setF606Step(1);
    } catch(e) { setF606Error(e.message); }
    setF606Loading(false);
  }

  // ── 606: Generar Excel con las 23 columnas oficiales ────────────────────────
  function f606Generate() {
    setF606Error(null);
    if (!f606Header.rnc || !f606Header.periodo) { setF606Error("Completa el RNC y el período antes de generar."); return; }
    if (f606Rows.length === 0) { setF606Error("No hay facturas para incluir."); return; }

    const headers = [
      "RNC o Cédula","Tipo Identificación","Tipo Bien o Servicio Comprado","NCF",
      "NCF o Documento Modificado","Fecha del Comprobante","Fecha de Pago",
      "Monto Facturado en Servicios","Monto Facturado en Bienes","Total Monto Facturado",
      "ITBIS Facturado","ITBIS Retenido","ITBIS Sujeto a Proporcionalidad (Art. 349)",
      "ITBIS llevado al Costo","ITBIS por Adelantar","ITBIS percibido en compras",
      "Tipo de Retención en ISR","Monto Retención Renta","ISR Percibido en compras",
      "Impuesto Selectivo al Consumo","Otros Impuestos/Tasas","Monto Propina Legal","Forma de Pago",
    ];

    const aoa = [headers];
    f606Rows.forEach(r => {
      aoa.push([
        r.rnc_cedula, r.tipo_id, r.tipo_bien_servicio, r.ncf, r.ncf_modificado,
        r.fecha_comprobante, r.fecha_pago,
        Number(r.monto_servicios)||0, Number(r.monto_bienes)||0, Number(r.monto_facturado_total)||0,
        Number(r.itbis_facturado)||0, Number(r.itbis_retenido)||0, Number(r.itbis_sujeto_proporcionalidad)||0,
        Number(r.itbis_llevado_costo)||0, Number(r.itbis_por_adelantar)||0, Number(r.itbis_percibido_compras)||0,
        r.tipo_retencion_isr, Number(r.monto_retencion_renta)||0, Number(r.isr_percibido_compras)||0,
        Number(r.impuesto_selectivo_consumo)||0, Number(r.otros_impuestos_tasas)||0,
        Number(r.monto_propina_legal)||0, r.forma_pago,
      ]);
    });

    const wsDetalle = XLSX.utils.aoa_to_sheet(aoa);
    const wsHeader  = XLSX.utils.aoa_to_sheet([
      ["Formato 606 — Envío de Compras de Bienes y Servicios"],
      ["RNC o Cédula del Informante", f606Header.rnc],
      ["Período (AAAAMM)", f606Header.periodo],
      ["Cantidad de Registros", f606Rows.length],
    ]);

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, wsHeader, "Encabezado");
    XLSX.utils.book_append_sheet(wb, wsDetalle, "Detalle 606");

    const out  = XLSX.write(wb, { bookType:"xlsx", type:"array" });
    const blob = new Blob([out], { type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
    const name = `606_${f606Header.rnc}_${f606Header.periodo}.xlsx`;
    setF606ResultBlob(blob); setF606ResultName(name);
    setF606Step(2);
  }

  function f606Download() {
    const url = URL.createObjectURL(f606ResultBlob);
    const a = document.createElement("a"); a.href=url; a.download=f606ResultName; a.click();
    URL.revokeObjectURL(url);
  }

  function f606Reset() {
    setF606Step(0); setF606Pdf(null); setF606Rows([]); setF606Error(null);
    setF606ResultBlob(null); setF606ResultName("");
  }

  function f606UpdRow(i, key, val) {
    setF606Rows(rows => { const arr=[...rows]; arr[i] = {...arr[i], [key]: val}; return arr; });
  }
  function f606DelRow(i) {
    setF606Rows(rows => rows.filter((_,j) => j!==i));
  }
  function f606AddRow() {
    setF606Rows(rows => [...rows, blankF606Row()]);
  }

  const f606Totals = () => f606Rows.reduce((acc, r) => ({
    facturado: acc.facturado + (Number(r.monto_facturado_total)||0),
    itbis: acc.itbis + (Number(r.itbis_facturado)||0),
    retencion: acc.retencion + (Number(r.monto_retencion_renta)||0),
  }), { facturado:0, itbis:0, retencion:0 });

  // ── Step 0 ────────────────────────────────────────────────────────────────
  async function analyzeTemplate() {
    if (!xlsxFile) return;
    setLoading(true); setError(null); setLoadingMsg("Analizando estructura de la plantilla…");
    try {
      const ab = await xlsxFile.arrayBuffer();
      const wb = XLSX.read(ab, { type:"array" });
      setXlsxData(wb);
      let summary = "";
      wb.SheetNames.forEach(name => {
        const ws   = wb.Sheets[name];
        const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:"" });
        summary += `\n\n=== HOJA: ${name} ===\n`;
        rows.slice(0,60).forEach((row, ri) => {
          const line = row.map((c,ci) => `${XLSX.utils.encode_cell({r:ri,c:ci})}:${c}`).filter(x=>x.split(":")[1]).join(" | ");
          if (line) summary += line+"\n";
        });
      });
      const system = `Eres experto contable dominicano. Analiza esta plantilla Excel de cheques/facturas.
Responde SOLO JSON válido sin markdown:
{"sheets":[],"cheque_fields":{"numero":"celda","fecha":"celda","beneficiario":"celda","monto":"celda","banco":"celda","cuenta":"celda","concepto":"celda","factura_ref":"celda"},"cuentas_start_row":10,"cuentas_sheet":"hoja","col_codigo_cuenta":"A","col_nombre_cuenta":"B","col_monto_cuenta":"C","col_debe":null,"col_haber":null,"notas":"descripción"}
Usa null si no encuentras un campo.`;
      const raw  = await callClaude([{role:"user",content:`Plantilla:\n${summary}`}], system);
      const info = parseJSON(raw);
      if (!info) throw new Error("No se pudo interpretar la plantilla.");
      setTemplateInfo(info);
      setStep(1);
    } catch(e) { setError(e.message); }
    setLoading(false);
  }

  // ── Step 1 ────────────────────────────────────────────────────────────────
  async function extractDocuments() {
    if (!chequeFile && !facturaFile) return;
    setLoading(true); setError(null);
    try {
      const blocks = [];
      if (chequeFile) {
        setLoadingMsg("Leyendo cheque…");
        const b64 = await fileToBase64(chequeFile);
        const mt  = getMediaType(chequeFile);
        blocks.push(mt==="application/pdf"
          ? {type:"document", source:{type:"base64",media_type:mt,data:b64}}
          : {type:"image",    source:{type:"base64",media_type:mt,data:b64}});
        blocks.push({type:"text", text:"DOCUMENTO 1: CHEQUE. Extrae todos los datos."});
      }
      if (facturaFile) {
        setLoadingMsg("Leyendo factura…");
        const b64 = await fileToBase64(facturaFile);
        const mt  = getMediaType(facturaFile);
        blocks.push(mt==="application/pdf"
          ? {type:"document", source:{type:"base64",media_type:mt,data:b64}}
          : {type:"image",    source:{type:"base64",media_type:mt,data:b64}});
        blocks.push({type:"text", text:"DOCUMENTO 2: FACTURA. Extrae datos y desglose de cuentas/rubros."});
      }
      blocks.push({type:"text", text:`Responde SOLO JSON válido sin markdown:
{"cheque":{"numero":"","fecha":"","beneficiario":"","monto_total":"","banco":"","cuenta_bancaria":"","concepto":"","numero_factura":""},"factura":{"numero":"","fecha":"","proveedor":"","ruc_rnc":"","subtotal":"","impuestos":"","total":"","cuentas":[{"codigo":"","descripcion":"","monto":""}]},"confianza":"alta|media|baja","notas":""}`});
      setLoadingMsg("Procesando con IA…");
      const system = `Eres experto en documentos financieros dominicanos. Extrae info visible con precisión. Campos no visibles déjalos vacíos. Responde ÚNICAMENTE JSON válido.`;
      const raw  = await callClaude([{role:"user", content:blocks}], system);
      const data = parseJSON(raw);
      if (!data) throw new Error("No se pudo extraer la información. Verifica que los archivos sean legibles.");
      setEditData(JSON.parse(JSON.stringify(data)));
      setStep(2);
    } catch(e) { setError(e.message); }
    setLoading(false);
  }

  // ── Step 2 ────────────────────────────────────────────────────────────────
  async function applyToTemplate() {
    if (!xlsxData || !templateInfo || !editData) return;
    setLoading(true); setError(null); setLoadingMsg("Generando Excel…");
    try {
      const wb = XLSX.utils.book_new();
      xlsxData.SheetNames.forEach(name => {
        const orig = xlsxData.Sheets[name];
        const ws   = {...orig};
        if (orig["!ref"])    ws["!ref"]    = orig["!ref"];
        if (orig["!merges"]) ws["!merges"] = orig["!merges"];
        if (orig["!cols"])   ws["!cols"]   = orig["!cols"];
        if (orig["!rows"])   ws["!rows"]   = orig["!rows"];
        XLSX.utils.book_append_sheet(wb, ws, name);
      });

      const sheetName = templateInfo.cuentas_sheet || wb.SheetNames[0];
      const ws = wb.Sheets[sheetName];
      if (!ws) throw new Error(`Hoja no encontrada: ${sheetName}`);

      const ch = editData.cheque  || {};
      const fa = editData.factura || {};
      const cf = templateInfo.cheque_fields || {};

      const setCell = (addr, val) => {
        if (!addr || addr==="null") return;
        ws[addr] = { v:val, t:typeof val==="number"?"n":"s" };
      };

      if (cf.numero)       setCell(cf.numero,       ch.numero||"");
      if (cf.fecha)        setCell(cf.fecha,         ch.fecha||"");
      if (cf.beneficiario) setCell(cf.beneficiario,  ch.beneficiario||"");
      if (cf.banco)        setCell(cf.banco,         ch.banco||"");
      if (cf.cuenta)       setCell(cf.cuenta,        ch.cuenta_bancaria||"");
      if (cf.concepto)     setCell(cf.concepto,      ch.concepto||"");
      if (cf.factura_ref)  setCell(cf.factura_ref,   ch.numero_factura||fa.numero||"");

      const cuentas  = fa.cuentas || [];
      const startRow = templateInfo.cuentas_start_row || 10;
      const colCod   = templateInfo.col_codigo_cuenta;
      const colNom   = templateInfo.col_nombre_cuenta;
      const colMon   = templateInfo.col_monto_cuenta;
      const colDebe  = templateInfo.col_debe;
      const colHabe  = templateInfo.col_haber;

      cuentas.forEach((c, i) => {
        const row = startRow+i;
        const m   = parseMonto(c.monto);
        if (colCod  && colCod!=="null")  setCell(`${colCod}${row}`,  c.codigo||"");
        if (colNom  && colNom!=="null")  setCell(`${colNom}${row}`,  c.descripcion||"");
        if (colMon  && colMon!=="null")  setCell(`${colMon}${row}`,  m);
        if (colDebe && colDebe!=="null") setCell(`${colDebe}${row}`, m);
        if (colHabe && colHabe!=="null") setCell(`${colHabe}${row}`, 0);
      });

      const ret = calcRet(fa, retenciones);
      const rr  = startRow+cuentas.length+1;
      const wRet = (row, label, monto) => {
        if (colNom && colNom!=="null") ws[`${colNom}${row}`] = {v:label, t:"s"};
        if (colMon && colMon!=="null") ws[`${colMon}${row}`] = {v:monto, t:"n"};
        if (colHabe && colHabe!=="null") ws[`${colHabe}${row}`] = {v:monto, t:"n"};
      };
      wRet(rr,   "── Base Imponible",             ret.base);
      if (retenciones.aplicar_isr)   wRet(rr+1, "Retención ISR 5% (Servicios)", -ret.montoIsr);
      if (retenciones.aplicar_itbis) wRet(rr+2, "Retención ITBIS 18%",          -ret.montoItbis);
      wRet(rr+3, "TOTAL RETENCIONES",            -ret.totalRet);
      wRet(rr+4, "NETO A PAGAR",                  ret.neto);
      if (cf.monto) setCell(cf.monto, ret.neto);

      const range = XLSX.utils.decode_range(ws["!ref"] || "A1:Z100");
      if (range.e.r < rr+5) { range.e.r = rr+6; ws["!ref"] = XLSX.utils.encode_range(range); }

      const out  = XLSX.write(wb, { bookType:"xlsx", type:"array" });
      const blob = new Blob([out], { type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
      const name = `cheque_${ch.numero||"000"}_${(ch.fecha||"").replace(/\//g,"-")||new Date().toISOString().slice(0,10)}.xlsx`;
      setResultBlob(blob); setResultName(name);
      setStep(3);
    } catch(e) { setError(e.message); }
    setLoading(false);
  }

  function downloadResult() {
    const url = URL.createObjectURL(resultBlob);
    const a = document.createElement("a"); a.href=url; a.download=resultName; a.click();
    URL.revokeObjectURL(url);
  }

  function reset() {
    setStep(0); setXlsxFile(null); setXlsxData(null); setTemplateInfo(null);
    setChequeFile(null); setFacturaFile(null); setEditData(null);
    setResultBlob(null); setResultName(""); setError(null);
    setRetenciones({aplicar_isr:true, aplicar_itbis:true, base_isr:"", base_itbis:""});
  }

  // ── Styles ────────────────────────────────────────────────────────────────
  const card = { background:C.card, border:`1px solid ${C.border}`, borderRadius:16, padding:24, marginBottom:20 };
  const btn  = (primary=true, disabled=false) => ({
    background: disabled?C.border:primary?C.accent:"transparent",
    color: disabled?C.muted:primary?"#fff":C.accent,
    border: primary?"none":`1px solid ${C.accent}`,
    borderRadius:10, padding:"11px 24px", fontWeight:700, fontSize:14,
    cursor:disabled?"not-allowed":"pointer", opacity:disabled?.6:1, transition:"all .2s",
  });
  const inp = { background:C.surface, border:`1px solid ${C.border}`, borderRadius:8, color:C.text, padding:"8px 12px", fontSize:13, width:"100%" };
  const lbl = { color:C.muted, fontSize:12, marginBottom:4, display:"block" };

  // ── Render ────────────────────────────────────────────────────────────────

        <button onClick={()=>setActiveModule("f606")} style={{
          flex:1, padding:"12px 16px", borderRadius:12, border:`1px solid ${activeModule==="f606"?C.accent:C.border}`,
          background:activeModule==="f606"?`${C.accent}1a`:C.card, color:activeModule==="f606"?C.text:C.muted,
          fontWeight:700, fontSize:13, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:8,
        }}>🏛️ Formato 606 DGII</button>
      </div>

      {activeModule==="cheques" && (
      <div style={{maxWidth:820, margin:"0 auto", padding:"24px 16px 0"}}>
        <StepBar step={step}/>

        {error && (
          <div style={{background:"#ef444422", border:`1px solid ${C.danger}`, borderRadius:10, padding:"12px 16px", marginBottom:20, color:C.danger, fontSize:13}}>
            ⚠️ {error}
          </div>
        )}

        {loading && <div style={card}><Spinner label={loadingMsg}/></div>}

        {/* PASO 1 */}
        {!loading && step===0 && (
          <div style={card}>
            <div style={{fontWeight:700, fontSize:15, marginBottom:6}}>Paso 1 — Sube tu plantilla Excel</div>
            <div style={{color:C.muted, fontSize:13, marginBottom:20}}>La IA detecta automáticamente la estructura sin importar el formato.</div>
            <UploadBox label="Seleccionar plantilla Excel" accept=".xlsx,.xls" file={xlsxFile} onChange={setXlsxFile} icon="📊" color={C.accent}/>
            <div style={{marginTop:20, display:"flex", justifyContent:"flex-end"}}>
              <button style={btn(true,!xlsxFile)} disabled={!xlsxFile} onClick={analyzeTemplate}>Analizar plantilla →</button>
            </div>
          </div>
        )}

        {!loading && step>=1 && templateInfo && (
          <div style={{...card, background:"#22c55e11", border:`1px solid ${C.success}`, padding:"14px 20px"}}>
            <div style={{display:"flex", justifyContent:"space-between", alignItems:"center"}}>
              <div>
                <div style={{fontWeight:700, color:C.success, fontSize:13}}>✅ Plantilla: {xlsxFile?.name}</div>
                <div style={{color:C.muted, fontSize:12}}>{templateInfo.notas}</div>
              </div>
              {step<3 && <button style={{...btn(false), fontSize:11, padding:"5px 12px"}} onClick={()=>{setStep(0);setTemplateInfo(null);}}>Cambiar</button>}
            </div>
          </div>
        )}

        {/* PASO 2 */}
        {!loading && step===1 && (
          <div style={card}>
            <div style={{fontWeight:700, fontSize:15, marginBottom:6}}>Paso 2 — Sube el cheque y/o la factura</div>
            <div style={{color:C.muted, fontSize:13, marginBottom:20}}>Imagen escaneada (JPG, PNG) o PDF. Puedes subir uno o ambos.</div>
            <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:14, marginBottom:20}}>
              <UploadBox label="Cheque escaneado" accept="image/*,.pdf" file={chequeFile} onChange={setChequeFile} icon="🏦" color="#4f7cff"/>
              <UploadBox label="Factura escaneada" accept="image/*,.pdf" file={facturaFile} onChange={setFacturaFile} icon="🧾" color="#f59e0b"/>
            </div>
            <div style={{display:"flex", justifyContent:"space-between"}}>
              <button style={btn(false)} onClick={()=>setStep(0)}>← Atrás</button>
              <button style={btn(true,!chequeFile&&!facturaFile)} disabled={!chequeFile&&!facturaFile} onClick={extractDocuments}>Extraer datos →</button>
            </div>
          </div>
        )}

        {/* PASO 3: Revisión */}
        {!loading && step===2 && editData && (() => {
          const updCheque = (k,v) => setEditData(d=>({...d,cheque:{...d.cheque,[k]:v}}));
          const updFact   = (k,v) => setEditData(d=>({...d,factura:{...d.factura,[k]:v}}));
          const updCuenta = (i,k,v) => { const arr=[...(editData.factura?.cuentas||[])]; arr[i]={...arr[i],[k]:v}; setEditData(d=>({...d,factura:{...d.factura,cuentas:arr}})); };
          const addCuenta = () => { const arr=[...(editData.factura?.cuentas||[]),{codigo:"",descripcion:"",monto:""}]; setEditData(d=>({...d,factura:{...d.factura,cuentas:arr}})); };
          const delCuenta = i => { const arr=(editData.factura?.cuentas||[]).filter((_,j)=>j!==i); setEditData(d=>({...d,factura:{...d.factura,cuentas:arr}})); };
          const ret     = calcRet(editData.factura, retenciones);
          const tog     = k => setRetenciones(r=>({...r,[k]:!r[k]}));
          const togBtn  = active => ({width:40,height:22,borderRadius:11,background:active?C.accent:C.border,position:"relative",cursor:"pointer",border:"none",transition:"background .2s",flexShrink:0});
          const knob    = active => ({position:"absolute",top:3,left:active?20:3,width:16,height:16,borderRadius:"50%",background:"#fff",transition:"left .2s"});

          return (<>
            {/* Cheque */}
            <div style={card}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                <div style={{fontWeight:700,fontSize:15}}>Datos del Cheque</div>
                <span style={{background:`${editData.confianza==="alta"?C.success:C.warning}22`,color:editData.confianza==="alta"?C.success:C.warning,borderRadius:6,padding:"2px 10px",fontSize:11,fontWeight:600}}>
                  Confianza: {editData.confianza||"media"}
                </span>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                {[["Número","numero"],["Fecha","fecha"],["Beneficiario","beneficiario"],["Monto Total","monto_total"],
                  ["Banco","banco"],["Cuenta Bancaria","cuenta_bancaria"],["Concepto","concepto"],["No. Factura","numero_factura"]
                ].map(([l,k])=>(
                  <div key={k}><label style={lbl}>{l}</label><input style={inp} value={editData.cheque?.[k]||""} onChange={e=>updCheque(k,e.target.value)}/></div>
                ))}
              </div>
            </div>

            {/* Factura cuentas */}
            <div style={card}>
              <div style={{fontWeight:700,fontSize:15,marginBottom:14}}>Factura — Desglose por Cuentas</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
                {[["No. Factura","numero"],["Fecha","fecha"],["Proveedor","proveedor"],["RNC/RUC","ruc_rnc"]].map(([l,k])=>(
                  <div key={k}><label style={lbl}>{l}</label><input style={inp} value={editData.factura?.[k]||""} onChange={e=>updFact(k,e.target.value)}/></div>
                ))}
              </div>
              <div style={{color:C.muted,fontSize:11,fontWeight:600,marginBottom:8}}>LÍNEAS DE CUENTAS / RUBROS</div>
              <div style={{display:"grid",gridTemplateColumns:"110px 1fr 110px 32px",gap:6,marginBottom:4}}>
                {["Código","Descripción / Rubro","Monto",""].map((h,i)=>(
                  <div key={i} style={{color:C.muted,fontSize:11,fontWeight:600,paddingLeft:2}}>{h}</div>
                ))}
              </div>
              {(editData.factura?.cuentas||[]).map((c,i)=>(
                <div key={i} style={{display:"grid",gridTemplateColumns:"110px 1fr 110px 32px",gap:6,marginBottom:6,alignItems:"center"}}>
                  <input placeholder="Código"       style={inp} value={c.codigo||""}      onChange={e=>updCuenta(i,"codigo",e.target.value)}/>
                  <input placeholder="Descripción"  style={inp} value={c.descripcion||""} onChange={e=>updCuenta(i,"descripcion",e.target.value)}/>
                  <input placeholder="Monto"        style={inp} value={c.monto||""}       onChange={e=>updCuenta(i,"monto",e.target.value)}/>
                  <button onClick={()=>delCuenta(i)} style={{background:C.danger+"22",border:"none",borderRadius:6,color:C.danger,cursor:"pointer",height:34,fontSize:14}}>✕</button>
                </div>
              ))}
              <button onClick={addCuenta} style={{...btn(false),fontSize:12,padding:"7px 14px",marginTop:6}}>+ Agregar cuenta</button>
              <div style={{marginTop:14,padding:"12px 16px",background:C.highlight,borderRadius:10,display:"flex",justifyContent:"space-between"}}>
                <span style={{fontWeight:600,fontSize:13}}>Total cuentas</span>
                <span style={{fontWeight:800,color:C.accent}}>RD$ {fmt((editData.factura?.cuentas||[]).reduce((s,c)=>s+parseMonto(c.monto),0))}</span>
              </div>
            </div>

            {/* Retenciones */}
            <div style={card}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
                <div style={{fontSize:22}}>🏛️</div>
                <div>
                  <div style={{fontWeight:700,fontSize:15}}>Retenciones DGII</div>
                  <div style={{color:C.muted,fontSize:11}}>República Dominicana · Normas vigentes</div>
                </div>
              </div>
              <div style={{background:C.highlight,borderRadius:10,padding:"11px 14px",marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{color:C.muted,fontSize:13}}>Base imponible</span>
                <span style={{fontWeight:700}}>RD$ {fmt(ret.base)}</span>
              </div>
              {/* ISR */}
              <div style={{border:`1px solid ${retenciones.aplicar_isr?C.accent:C.border}`,borderRadius:12,padding:"13px 14px",marginBottom:10,background:retenciones.aplicar_isr?`${C.accent}0d`:C.surface}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:retenciones.aplicar_isr?10:0}}>
                  <div>
                    <div style={{fontWeight:600,fontSize:13}}>Retención ISR — 5%</div>
                    <div style={{color:C.muted,fontSize:11}}>Art. 309 Código Tributario · Servicios</div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    {retenciones.aplicar_isr && <span style={{color:C.accent,fontWeight:700}}>− RD$ {fmt(ret.montoIsr)}</span>}
                    <button style={togBtn(retenciones.aplicar_isr)} onClick={()=>tog("aplicar_isr")}><div style={knob(retenciones.aplicar_isr)}/></button>
                  </div>
                </div>
                {retenciones.aplicar_isr && (
                  <div><label style={lbl}>Base ISR (editable)</label>
                  <input style={{...inp,maxWidth:180}} placeholder={`${fmt(ret.base)} (auto)`} value={retenciones.base_isr} onChange={e=>setRetenciones(r=>({...r,base_isr:e.target.value}))}/></div>
                )}
              </div>
              {/* ITBIS */}
              <div style={{border:`1px solid ${retenciones.aplicar_itbis?C.warning:C.border}`,borderRadius:12,padding:"13px 14px",marginBottom:14,background:retenciones.aplicar_itbis?"#f59e0b0d":C.surface}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:retenciones.aplicar_itbis?10:0}}>
                  <div>
                    <div style={{fontWeight:600,fontSize:13}}>Retención ITBIS — 18%</div>
                    <div style={{color:C.muted,fontSize:11}}>Ley 253-12 · ITBIS facturado</div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    {retenciones.aplicar_itbis && <span style={{color:C.warning,fontWeight:700}}>− RD$ {fmt(ret.montoItbis)}</span>}
                    <button style={togBtn(retenciones.aplicar_itbis)} onClick={()=>tog("aplicar_itbis")}><div style={knob(retenciones.aplicar_itbis)}/></button>
                  </div>
                </div>
                {retenciones.aplicar_itbis && (
                  <div><label style={lbl}>Base ITBIS (editable)</label>
                  <input style={{...inp,maxWidth:180}} placeholder={`${fmt(ret.base)} (auto)`} value={retenciones.base_itbis} onChange={e=>setRetenciones(r=>({...r,base_itbis:e.target.value}))}/></div>
                )}
              </div>
              {/* Resumen */}
              <div style={{borderTop:`1px solid ${C.border}`,paddingTop:12}}>
                {[
                  ["Subtotal factura", `RD$ ${fmt(ret.base)}`, null],
                  retenciones.aplicar_isr   ? ["(−) Ret. ISR 5%",   `− RD$ ${fmt(ret.montoIsr)}`,   C.accent]  : null,
                  retenciones.aplicar_itbis ? ["(−) Ret. ITBIS 18%",`− RD$ ${fmt(ret.montoItbis)}`, C.warning] : null,
                ].filter(Boolean).map(([l,v,col],i)=>(
                  <div key={i} style={{display:"flex",justifyContent:"space-between",marginBottom:6,fontSize:13}}>
                    <span style={{color:C.muted}}>{l}</span><span style={{color:col||C.text}}>{v}</span>
                  </div>
                ))}
                <div style={{display:"flex",justifyContent:"space-between",background:C.highlight,borderRadius:10,padding:"11px 14px",marginTop:6}}>
                  <span style={{fontWeight:700,fontSize:14}}>💵 Neto a pagar</span>
                  <span style={{fontWeight:800,fontSize:16,color:C.success}}>RD$ {fmt(ret.neto)}</span>
                </div>
              </div>
            </div>

            {editData.notas && (
              <div style={{...card,background:"#f59e0b11",border:`1px solid ${C.warning}`,padding:"12px 16px"}}>
                <div style={{color:C.warning,fontSize:13}}>📌 {editData.notas}</div>
              </div>
            )}

            <div style={{display:"flex",justifyContent:"space-between",marginBottom:20}}>
              <button style={btn(false)} onClick={()=>setStep(1)}>← Atrás</button>
              <button style={btn()} onClick={applyToTemplate}>Aplicar a plantilla →</button>
            </div>
          </>);
        })()}

        {/* PASO 4: Exportar */}
        {!loading && step===3 && (
          <div style={card}>
            <div style={{textAlign:"center",padding:"20px 0"}}>
              <div style={{fontSize:52,marginBottom:12}}>🎉</div>
              <div style={{fontWeight:800,fontSize:20,marginBottom:6}}>¡Plantilla completada!</div>
              <div style={{color:C.muted,marginBottom:24,fontSize:13}}>{resultName}</div>
              <div style={{display:"flex",gap:12,justifyContent:"center",flexWrap:"wrap",marginBottom:24}}>
                <button style={{...btn(),background:"linear-gradient(135deg,#4f7cff,#7c3aed)",padding:"13px 30px",fontSize:15}} onClick={downloadResult}>
                  ⬇️ Descargar Excel
                </button>
                <button style={btn(false)} onClick={reset}>Procesar otro cheque</button>
              </div>
              {(() => {
                const ret = calcRet(editData?.factura, retenciones);
                return (
                  <div style={{background:C.highlight,borderRadius:12,padding:"16px 20px",textAlign:"left"}}>
                    <div style={{color:C.muted,fontSize:11,fontWeight:600,marginBottom:10}}>RESUMEN APLICADO</div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,fontSize:13}}>
                      <div><span style={{color:C.muted}}>Cheque No.:</span> <strong>{editData?.cheque?.numero}</strong></div>
                      <div><span style={{color:C.muted}}>Fecha:</span> <strong>{editData?.cheque?.fecha}</strong></div>
                      <div><span style={{color:C.muted}}>Beneficiario:</span> <strong>{editData?.cheque?.beneficiario}</strong></div>
                      <div><span style={{color:C.muted}}>Factura:</span> <strong>{editData?.factura?.numero||editData?.cheque?.numero_factura}</strong></div>
                      <div><span style={{color:C.muted}}>Subtotal:</span> <strong>RD$ {fmt(ret.base)}</strong></div>
                      {retenciones.aplicar_isr && <div><span style={{color:C.muted}}>Ret. ISR 5%:</span> <strong style={{color:C.accent}}>− RD$ {fmt(ret.montoIsr)}</strong></div>}
                      {retenciones.aplicar_itbis && <div><span style={{color:C.muted}}>Ret. ITBIS 18%:</span> <strong style={{color:C.warning}}>− RD$ {fmt(ret.montoItbis)}</strong></div>}
                      <div style={{gridColumn:"1/-1",background:"#0f1117",borderRadius:8,padding:"8px 12px",display:"flex",justifyContent:"space-between"}}>
                        <span style={{color:C.muted}}>Neto pagado:</span>
                        <strong style={{color:C.success,fontSize:15}}>RD$ {fmt(ret.neto)}</strong>
                      </div>
                    </div>
                  </div>
                );
              })()}
            </div>
          </div>
        )}

      </div>
      )}

      {activeModule==="f606" && (() => {
        const totals = f606Totals();
        return (
        <div style={{maxWidth:1100, margin:"0 auto", padding:"24px 16px 0"}}>

          {/* Mini step indicator for 606 */}
          <div style={{display:"flex", marginBottom:24, gap:0}}>
            {["Subir PDF","Revisar Facturas","Exportar"].map((s,i) => (
              <div key={s} style={{flex:1, display:"flex", alignItems:"center"}}>
                <div style={{width:26,height:26,borderRadius:"50%",background:i<=f606Step?C.accent:C.border,color:i<=f606Step?"#fff":C.muted,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:12,flexShrink:0}}>{i+1}</div>
                <div style={{color:i<=f606Step?C.text:C.muted, fontSize:12, marginLeft:6, fontWeight:i===f606Step?700:400}}>{s}</div>
                {i<2 && <div style={{flex:1,height:2,background:i<f606Step?C.accent:C.border,margin:"0 8px"}}/>}
              </div>
            ))}
          </div>

          {f606Error && (
            <div style={{background:"#ef444422", border:`1px solid ${C.danger}`, borderRadius:10, padding:"12px 16px", marginBottom:20, color:C.danger, fontSize:13}}>
              ⚠️ {f606Error}
            </div>
          )}

          {f606Loading && <div style={card}><Spinner label={f606LoadingMsg}/></div>}

          {/* PASO 1: Subir PDF mensual */}
          {!f606Loading && f606Step===0 && (
            <div style={card}>
              <div style={{fontWeight:700, fontSize:15, marginBottom:6}}>Sube el PDF con todas las facturas del mes</div>
              <div style={{color:C.muted, fontSize:13, marginBottom:20}}>
                Un solo archivo (PDF o imagen) con todas las facturas de compra escaneadas del período. La IA identificará cada factura por separado y extraerá los datos para el Formato 606.
              </div>
              <UploadBox label="Subir PDF mensual de facturas" accept=".pdf,image/*" file={f606Pdf} onChange={setF606Pdf} icon="📑" color={C.accent}/>

              <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:14, marginTop:20}}>
                <div>
                  <label style={lbl}>RNC de tu negocio</label>
                  <input style={inp} placeholder="130000000" value={f606Header.rnc} onChange={e=>setF606Header(h=>({...h, rnc:e.target.value.replace(/[^0-9]/g,"")}))}/>
                </div>
                <div>
                  <label style={lbl}>Período (AAAAMM)</label>
                  <input style={inp} placeholder="202606" value={f606Header.periodo} onChange={e=>setF606Header(h=>({...h, periodo:e.target.value.replace(/[^0-9]/g,"")}))}/>
                </div>
              </div>

              <div style={{marginTop:20, display:"flex", justifyContent:"flex-end"}}>
                <button style={btn(true,!f606Pdf)} disabled={!f606Pdf} onClick={f606Extract}>Extraer facturas →</button>
              </div>
            </div>
          )}

          {/* PASO 2: Revisar tabla de facturas */}
          {!f606Loading && f606Step===1 && (
            <>
              <div style={{...card, background:"#22c55e11", border:`1px solid ${C.success}`, padding:"14px 20px"}}>
                <div style={{fontWeight:700, color:C.success, fontSize:13}}>✅ {f606Rows.length} factura(s) identificada(s)</div>
                <div style={{color:C.muted, fontSize:12}}>Revisa y corrige los datos antes de generar el Excel. Todos los campos son editables.</div>
              </div>

              <div style={{...card, overflowX:"auto"}}>
                <div style={{fontWeight:700, fontSize:15, marginBottom:14}}>Detalle de Compras — Formato 606</div>

                <table style={{borderCollapse:"collapse", width:"100%", minWidth:1400, fontSize:12}}>
                  <thead>
                    <tr>
                      {["RNC/Cédula","Tipo Id","Tipo Bien/Serv.","NCF","NCF Modif.","Fecha Comp.","Fecha Pago",
                        "Mto. Servicios","Mto. Bienes","Total Facturado","ITBIS Fact.","ITBIS Retenido",
                        "ITBIS Adelantar","Tipo Ret. ISR","Mto. Ret. Renta","Forma Pago","Proveedor",""].map(h => (
                        <th key={h} style={{textAlign:"left", padding:"6px 8px", color:C.muted, fontWeight:600, borderBottom:`1px solid ${C.border}`, whiteSpace:"nowrap"}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {f606Rows.map((r,i) => (
                      <tr key={i} style={{borderBottom:`1px solid ${C.border}`}}>
                        <td style={{padding:4}}><input style={{...inp, width:110, fontSize:12}} value={r.rnc_cedula} onChange={e=>f606UpdRow(i,"rnc_cedula",e.target.value.replace(/[^0-9]/g,""))}/></td>
                        <td style={{padding:4}}>
                          <select style={{...inp, width:64, fontSize:12}} value={r.tipo_id} onChange={e=>f606UpdRow(i,"tipo_id",e.target.value)}>
                            {F606_TIPOS_ID.map(([v,l])=><option key={v} value={v}>{v}</option>)}
                          </select>
                        </td>
                        <td style={{padding:4}}>
                          <select style={{...inp, width:90, fontSize:12}} value={r.tipo_bien_servicio} onChange={e=>f606UpdRow(i,"tipo_bien_servicio",e.target.value)}>
                            {F606_TIPOS_BIEN.map(([v,l])=><option key={v} value={v} title={l}>{v}</option>)}
                          </select>
                        </td>
                        <td style={{padding:4}}><input style={{...inp, width:140, fontSize:12}} value={r.ncf} onChange={e=>f606UpdRow(i,"ncf",e.target.value)}/></td>
                        <td style={{padding:4}}><input style={{...inp, width:110, fontSize:12}} value={r.ncf_modificado} onChange={e=>f606UpdRow(i,"ncf_modificado",e.target.value)}/></td>
                        <td style={{padding:4}}><input style={{...inp, width:100, fontSize:12}} placeholder="AAAAMMDD" value={r.fecha_comprobante} onChange={e=>f606UpdRow(i,"fecha_comprobante",e.target.value.replace(/[^0-9]/g,""))}/></td>
                        <td style={{padding:4}}><input style={{...inp, width:100, fontSize:12}} placeholder="AAAAMMDD" value={r.fecha_pago} onChange={e=>f606UpdRow(i,"fecha_pago",e.target.value.replace(/[^0-9]/g,""))}/></td>
                        <td style={{padding:4}}><input style={{...inp, width:90, fontSize:12}} value={r.monto_servicios} onChange={e=>f606UpdRow(i,"monto_servicios",e.target.value)}/></td>
                        <td style={{padding:4}}><input style={{...inp, width:90, fontSize:12}} value={r.monto_bienes} onChange={e=>f606UpdRow(i,"monto_bienes",e.target.value)}/></td>
                        <td style={{padding:4}}><input style={{...inp, width:100, fontSize:12, fontWeight:700}} value={r.monto_facturado_total} onChange={e=>f606UpdRow(i,"monto_facturado_total",e.target.value)}/></td>
                        <td style={{padding:4}}><input style={{...inp, width:90, fontSize:12}} value={r.itbis_facturado} onChange={e=>f606UpdRow(i,"itbis_facturado",e.target.value)}/></td>
                        <td style={{padding:4}}><input style={{...inp, width:90, fontSize:12}} value={r.itbis_retenido} onChange={e=>f606UpdRow(i,"itbis_retenido",e.target.value)}/></td>
                        <td style={{padding:4}}><input style={{...inp, width:90, fontSize:12}} value={r.itbis_por_adelantar} onChange={e=>f606UpdRow(i,"itbis_por_adelantar",e.target.value)}/></td>
                        <td style={{padding:4}}><input style={{...inp, width:70, fontSize:12}} value={r.tipo_retencion_isr} onChange={e=>f606UpdRow(i,"tipo_retencion_isr",e.target.value)}/></td>
                        <td style={{padding:4}}><input style={{...inp, width:90, fontSize:12}} value={r.monto_retencion_renta} onChange={e=>f606UpdRow(i,"monto_retencion_renta",e.target.value)}/></td>
                        <td style={{padding:4}}>
                          <select style={{...inp, width:64, fontSize:12}} value={r.forma_pago} onChange={e=>f606UpdRow(i,"forma_pago",e.target.value)}>
                            {F606_FORMA_PAGO.map(([v,l])=><option key={v} value={v}>{v}</option>)}
                          </select>
                        </td>
                        <td style={{padding:4, color:C.muted, maxWidth:140, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap"}} title={r._proveedor}>{r._proveedor}</td>
                        <td style={{padding:4}}><button onClick={()=>f606DelRow(i)} style={{background:C.danger+"22",border:"none",borderRadius:6,color:C.danger,cursor:"pointer",height:30,width:30,fontSize:13}}>✕</button></td>
                      </tr>
                    ))}
                  </tbody>
                </table>

                <button onClick={f606AddRow} style={{...btn(false), fontSize:12, padding:"7px 14px", marginTop:14}}>+ Agregar factura manualmente</button>

                <div style={{marginTop:18, display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:12}}>
                  <div style={{background:C.highlight, borderRadius:10, padding:"12px 14px"}}>
                    <div style={{color:C.muted, fontSize:11}}>Total Facturado</div>
                    <div style={{fontWeight:800, fontSize:15}}>RD$ {fmt(totals.facturado)}</div>
                  </div>
                  <div style={{background:C.highlight, borderRadius:10, padding:"12px 14px"}}>
                    <div style={{color:C.muted, fontSize:11}}>ITBIS Total</div>
                    <div style={{fontWeight:800, fontSize:15, color:C.accent}}>RD$ {fmt(totals.itbis)}</div>
                  </div>
                  <div style={{background:C.highlight, borderRadius:10, padding:"12px 14px"}}>
                    <div style={{color:C.muted, fontSize:11}}>Retención ISR Total</div>
                    <div style={{fontWeight:800, fontSize:15, color:C.warning}}>RD$ {fmt(totals.retencion)}</div>
                  </div>
                </div>
              </div>

              <div style={{...card, padding:"16px 20px"}}>
                <div style={{fontWeight:700, fontSize:14, marginBottom:12}}>Encabezado del Formato 606</div>
                <div style={{display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:14}}>
                  <div>
                    <label style={lbl}>RNC de tu negocio</label>
                    <input style={inp} value={f606Header.rnc} onChange={e=>setF606Header(h=>({...h, rnc:e.target.value.replace(/[^0-9]/g,"")}))}/>
                  </div>
                  <div>
                    <label style={lbl}>Período (AAAAMM)</label>
                    <input style={inp} value={f606Header.periodo} onChange={e=>setF606Header(h=>({...h, periodo:e.target.value.replace(/[^0-9]/g,"")}))}/>
                  </div>
                  <div>
                    <label style={lbl}>Cantidad de Registros</label>
                    <input style={{...inp, opacity:0.6}} value={f606Rows.length} disabled/>
                  </div>
                </div>
              </div>

              <div style={{display:"flex", justifyContent:"space-between", marginBottom:20}}>
                <button style={btn(false)} onClick={()=>setF606Step(0)}>← Atrás</button>
                <button style={btn()} onClick={f606Generate}>Generar Excel 606 →</button>
              </div>
            </>
          )}

          {/* PASO 3: Exportar */}
          {!f606Loading && f606Step===2 && (
            <div style={card}>
              <div style={{textAlign:"center", padding:"20px 0"}}>
                <div style={{fontSize:52, marginBottom:12}}>🎉</div>
                <div style={{fontWeight:800, fontSize:20, marginBottom:6}}>¡Formato 606 generado!</div>
                <div style={{color:C.muted, marginBottom:6, fontSize:13}}>{f606ResultName}</div>
                <div style={{color:C.muted, marginBottom:24, fontSize:12}}>{f606Rows.length} facturas · Período {f606Header.periodo}</div>

                <div style={{display:"flex", gap:12, justifyContent:"center", flexWrap:"wrap", marginBottom:24}}>
                  <button style={{...btn(), background:"linear-gradient(135deg,#4f7cff,#7c3aed)", padding:"13px 30px", fontSize:15}} onClick={f606Download}>
                    ⬇️ Descargar Excel 606
                  </button>
                  <button style={btn(false)} onClick={f606Reset}>Procesar otro mes</button>
                </div>

                <div style={{background:C.highlight, borderRadius:12, padding:"16px 20px", textAlign:"left", fontSize:13}}>
                  <div style={{color:C.muted, fontSize:11, fontWeight:600, marginBottom:10}}>⚠️ IMPORTANTE ANTES DE ENVIAR A LA DGII</div>
                  <div style={{color:C.text, lineHeight:1.6}}>
                    Este Excel contiene las 23 columnas del Formato 606 listas para revisión. Antes de remitirlo a la Oficina Virtual debes:
                  </div>
                  <ul style={{color:C.muted, marginTop:8, paddingLeft:18, lineHeight:1.8}}>
                    <li>Verificar cada NCF y RNC contra la factura original</li>
                    <li>Pasar los datos a la plantilla oficial de la DGII (con macros) para generar el .TXT</li>
                    <li>Correr la Herramienta de Pre-Validación de la DGII antes de remitir</li>
                  </ul>
                </div>
              </div>
            </div>
          )}

        </div>
        );
      })()}

    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
